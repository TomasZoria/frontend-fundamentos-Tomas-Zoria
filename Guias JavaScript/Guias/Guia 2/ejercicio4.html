<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
</head>
<body>
    <script>
        let lado1, lado2, lado3;
        lado1 = parseFloat(prompt("Ingrese el primer lado del triángulo:"));
        lado2 = parseFloat(prompt("Ingrese el segundo lado del triángulo:"));
        lado3 = parseFloat(prompt("Ingrese el tercer lado del triángulo:"));

        if (lado1 === lado2 && lado2 === lado3) {
            document.write("El triángulo es equilátero.");
        } else if (lado1 === lado2 || lado1 === lado3 || lado2 === lado3) {
            document.write("El triángulo es isósceles.");
        } else {
            document.write("El triángulo es escaleno.");
        }
        
    </script>
    <footer>
        <a href="/Guias JavaScript/Guias/guia2.html">Volver</a>
    </footer>
</body>
</html>
