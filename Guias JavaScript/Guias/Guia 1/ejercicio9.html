<body>
    <script>
        const pesoDolar = 1392.92

        let dolar = parseInt(prompt("Ingrese la cantidad de dolares"))

        const conversion = pesoDolar * dolar
        const texto = `Tiene $ ${conversion.toFixed(2)} pesos`

        document.write(texto)

    </script>
