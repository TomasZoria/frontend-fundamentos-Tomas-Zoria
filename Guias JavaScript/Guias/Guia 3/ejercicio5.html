<body>
    <script>    
        let rand = Math.random() * 10
        rand = Math.floor(rand)
        document.write(rand + "<br>")


            let num = prompt("Adivina el número del 1 al 10!")

            while (num != rand){
                document.write("Numero incorrecto!. Intentar nuevamente <br>")
                num = prompt("Adivina el número del 1 al 10!")
            }
            document.write("Acertaste! El numero era: " + rand + "<br>")
            document.write("Felicitaciones!")
    </script>
