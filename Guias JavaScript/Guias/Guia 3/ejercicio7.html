<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7</title>
</head>
<body>
    <script>
        let columnas = Number(prompt("Ingrese el numero de filas: "))
        let filas = Number(prompt("Ingrese el numero de columnas: "))

        for (let f = 0; f<columnas; f++){
            for (let c = 0; c<filas;c++){
                document.write("x")
            }
            document.write("<br>")
        }
    </script>

        <a href="/Guias JavaScript/Guias/guia3.html">Volver</a>
    </footer>
</body>
</html>
