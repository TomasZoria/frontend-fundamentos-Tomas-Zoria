    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        for (let x = 1; x <= 10; x++){
           if (x % 2 == 0){
            document.write("<strong>" + x + "</strong><br>")
           }
           else {
            document.write("<em>" + x + "</em><br>")
           }
        }
    </script>
