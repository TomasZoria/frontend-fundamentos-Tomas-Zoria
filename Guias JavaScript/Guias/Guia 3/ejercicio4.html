<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
</head>
<body>
    <script>
        let num = Number(prompt("Ingrese el numero para ver su tabla de multiplicar: "))

        for (let x = 1;x<=10;x++){
            document.write(num + "x" + x + "=" + num*x + "<br>")
        }
    </script>

    </footer>
</body>
