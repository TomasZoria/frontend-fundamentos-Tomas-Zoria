<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 6</title>
</head>
<body>
    <script>
        let producto = prompt("Ingrese el producto o fin para finalizar: ")
        let cantidad = 1

        while (producto != "fin"){
            document.write(cantidad + " - " + producto + "<br>")
            cantidad++

            producto = prompt("Ingrese el producto o fin para finalizar: ")
        }


    </script>

    </footer>
</body>
</html>
